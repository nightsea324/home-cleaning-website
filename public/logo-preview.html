<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo 設計預覽 - 昕禾生活</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f0f0; padding: 40px 20px; }
    h1 { text-align: center; color: #2c3e50; margin-bottom: 12px; font-size: 24px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 40px; font-size: 14px; }
    .grid { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 32px; }
    .card { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
    .card h2 { color: #1a7f5a; font-size: 18px; margin-bottom: 4px; }
    .card p { color: #999; font-size: 13px; margin-bottom: 24px; }
    .previews { display: flex; flex-direction: column; gap: 12px; }
    .row { display: flex; align-items: center; gap: 16px; padding: 20px; border-radius: 12px; }
    .row svg { height: 52px; width: auto; }
    .bg-white { background: #ffffff; border: 1px solid #eee; }
    .bg-green { background: #e8f5e9; }
    .bg-dark { background: #1D1D1D; }
    .tag { font-size: 11px; color: #bbb; min-width: 50px; }
    .bg-dark .tag { color: #555; }
    .nav-mock { background: #fafafa; border-radius: 12px; padding: 14px 24px; display: flex; align-items: center; gap: 20px; margin-top: 16px; border: 1px solid #eee; flex-wrap: wrap; }
    .nav-mock svg { height: 36px; width: auto; }
    .nav-mock span { color: #888; font-size: 14px; }
    .nav-mock .btn { background: #1a7f5a; color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 13px; }
    .spacer { flex: 1; }
  </style>
</head>
<body>
  <h1>Logo 設計方案預覽</h1>
  <p class="subtitle">三個設計方向，點選喜歡的告訴我</p>
  <div class="grid">

    <!-- 方案 A -->
    <div class="card">
      <h2>方案 A — 葉子圓標 + 橫排文字</h2>
      <p>簡潔現代風格，圓形綠底葉子圖標，「昕禾」粗體 +「生活」綠色</p>
      <div class="previews">
        <div class="row bg-white">
          <span class="tag">淺色底</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
            <circle cx="30" cy="30" r="28" fill="#1a7f5a"/>
            <path d="M30 12 C18 20, 14 36, 30 48 C46 36, 42 20, 30 12Z" fill="#fff" opacity="0.9"/>
            <path d="M30 18 L30 48" stroke="#1a7f5a" stroke-width="2" stroke-linecap="round"/>
            <path d="M24 28 L30 24" stroke="#1a7f5a" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M24 34 L30 30" stroke="#1a7f5a" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M36 26 L30 22" stroke="#1a7f5a" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M36 32 L30 28" stroke="#1a7f5a" stroke-width="1.5" stroke-linecap="round"/>
            <text x="70" y="39" font-family="Noto Sans TC, sans-serif" font-size="32" font-weight="700" fill="#2c3e50">昕禾</text>
            <text x="138" y="39" font-family="Noto Sans TC, sans-serif" font-size="32" font-weight="400" fill="#1a7f5a">生活</text>
          </svg>
        </div>
        <div class="row bg-green">
          <span class="tag">品牌色</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
            <circle cx="30" cy="30" r="28" fill="#1a7f5a"/>
            <path d="M30 12 C18 20, 14 36, 30 48 C46 36, 42 20, 30 12Z" fill="#fff" opacity="0.9"/>
            <path d="M30 18 L30 48" stroke="#1a7f5a" stroke-width="2" stroke-linecap="round"/>
            <path d="M24 28 L30 24" stroke="#1a7f5a" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M24 34 L30 30" stroke="#1a7f5a" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M36 26 L30 22" stroke="#1a7f5a" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M36 32 L30 28" stroke="#1a7f5a" stroke-width="1.5" stroke-linecap="round"/>
            <text x="70" y="39" font-family="Noto Sans TC, sans-serif" font-size="32" font-weight="700" fill="#2c3e50">昕禾</text>
            <text x="138" y="39" font-family="Noto Sans TC, sans-serif" font-size="32" font-weight="400" fill="#1a7f5a">生活</text>
          </svg>
        </div>
      </div>
      <div class="nav-mock">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none" style="height:32px">
          <circle cx="30" cy="30" r="28" fill="#1a7f5a"/>
          <path d="M30 12 C18 20, 14 36, 30 48 C46 36, 42 20, 30 12Z" fill="#fff" opacity="0.9"/>
          <path d="M30 18 L30 48" stroke="#1a7f5a" stroke-width="2" stroke-linecap="round"/>
          <text x="70" y="39" font-family="Noto Sans TC, sans-serif" font-size="32" font-weight="700" fill="#2c3e50">昕禾</text>
          <text x="138" y="39" font-family="Noto Sans TC, sans-serif" font-size="32" font-weight="400" fill="#1a7f5a">生活</text>
        </svg>
        <span class="spacer"></span>
        <span>首頁</span> <span>服務項目</span> <span>關於我們</span>
        <span class="btn">立即預約</span>
      </div>
    </div>

    <!-- 方案 B -->
    <div class="card">
      <h2>方案 B — 房子葉子 + 雙層排版</h2>
      <p>穩重專業，房子輪廓內嵌葉子，上方大字下方副標搭配分隔線</p>
      <div class="previews">
        <div class="row bg-white">
          <span class="tag">淺色底</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" fill="none">

            <path d="M34 33 L30 30" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
            <text x="64" y="28" font-family="Noto Sans TC, sans-serif" font-size="26" font-weight="800" fill="#1a7f5a" letter-spacing="4">昕禾</text>
            <text x="64" y="50" font-family="Noto Sans TC, sans-serif" font-size="16" font-weight="400" fill="#666" letter-spacing="6">生活事業</text>
            <line x1="64" y1="33" x2="160" y2="33" stroke="#1a7f5a" stroke-width="1.5" opacity="0.3"/>
          </svg>
        </div>
        <div class="row bg-green">
          <span class="tag">品牌色</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" fill="none">
            <path d="M30 8 L8 28 L14 28 L14 50 L46 50 L46 28 L52 28 Z" fill="none" stroke="#1a7f5a" stroke-width="3" stroke-linejoin="round"/>

            <line x1="64" y1="33" x2="160" y2="33" stroke="#1a7f5a" stroke-width="1.5" opacity="0.3"/>
          </svg>
        </div>
      </div>
      <div class="nav-mock">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" fill="none" style="height:36px">
          <path d="M30 8 L8 28 L14 28 L14 50 L46 50 L46 28 L52 28 Z" fill="none" stroke="#1a7f5a" stroke-width="3" stroke-linejoin="round"/>
          <path d="M30 24 C22 30, 22 40, 30 44 C38 40, 38 30, 30 24Z" fill="#1a7f5a" opacity="0.8"/>
          <path d="M30 27 L30 42" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
          <text x="64" y="28" font-family="Noto Sans TC, sans-serif" font-size="26" font-weight="800" fill="#1a7f5a" letter-spacing="4">昕禾</text>
          <text x="64" y="50" font-family="Noto Sans TC, sans-serif" font-size="16" font-weight="400" fill="#666" letter-spacing="6">生活事業</text>
          <line x1="64" y1="33" x2="160" y2="33" stroke="#1a7f5a" stroke-width="1.5" opacity="0.3"/>
        </svg>
        <span class="spacer"></span>
        <span>首頁</span> <span>服務項目</span> <span>關於我們</span>
        <span class="btn">立即預約</span>
      </div>
    </div>

    <!-- 方案 C -->
    <div class="card">
      <h2>方案 C — 水滴葉子 + 英文副標</h2>
      <p>清新國際感，水滴造型融合葉子（潔淨+自然），搭配英文 XINHE LIVING</p>
      <div class="previews">
        <div class="row bg-white">
          <span class="tag">淺色底</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
            <path d="M28 6 C28 6, 6 30, 6 40 C6 52, 16 58, 28 58 C40 58, 50 52, 50 40 C50 30, 28 6, 28 6Z" fill="#e8f5e9" stroke="#1a7f5a" stroke-width="2.5"/>
            <path d="M28 20 C20 28, 18 38, 28 46 C38 38, 36 28, 28 20Z" fill="#1a7f5a"/>
            <path d="M28 24 L28 43" stroke="#e8f5e9" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M24 32 L28 28" stroke="#e8f5e9" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M32 32 L28 28" stroke="#e8f5e9" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M24 37 L28 33" stroke="#e8f5e9" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M32 37 L28 33" stroke="#e8f5e9" stroke-width="1.2" stroke-linecap="round"/>
            <text x="62" y="30" font-family="Noto Sans TC, sans-serif" font-size="28" font-weight="700" fill="#2c3e50" letter-spacing="2">昕禾生活</text>
            <text x="62" y="50" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#1a7f5a" letter-spacing="3">XINHE LIVING</text>
          </svg>
        </div>
        <div class="row bg-green">
          <span class="tag">品牌色</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
            <path d="M28 6 C28 6, 6 30, 6 40 C6 52, 16 58, 28 58 C40 58, 50 52, 50 40 C50 30, 28 6, 28 6Z" fill="#e8f5e9" stroke="#1a7f5a" stroke-width="2.5"/>

      </div>

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none" style="height:36px">
          <path d="M28 6 C28 6, 6 30, 6 40 C6 52, 16 58, 28 58 C40 58, 50 52, 50 40 C50 30, 28 6, 28 6Z" fill="#e8f5e9" stroke="#1a7f5a" stroke-width="2.5"/>
          <path d="M28 20 C20 28, 18 38, 28 46 C38 38, 36 28, 28 20Z" fill="#1a7f5a"/>

          <text x="62" y="50" font-family="Arial, sans-serif" font-size="12" font-weight="500" fill="#1a7f5a" letter-spacing="3">XINHE LIVING</text>
        </svg>
        <span class="spacer"></span>
        <span>首頁</span> <span>服務項目</span> <span>關於我們</span>
        <span class="btn">立即預約</span>

    </div>

  </div>
</body>
